<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappool</title>

    <link rel="stylesheet" href="style.css">

    <!-- Dela Gothic One Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main">
        <!-- Team Red -->
        <div class="country-flag red-country-flag" id="red-country-flag"></div>
        <div class="country-banner red-country-banner"></div>
        <div class="country-name red-country-name" id="red-country-name">COUNTRY</div>
        <div class="country-star-container red-country-star-container" id="red-country-star-container">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
        </div>

        <!-- Team Blue -->
        <div class="country-flag blue-country-flag" id="blue-country-flag"></div>
        <div class="country-banner blue-country-banner"></div>
        <div class="country-name blue-country-name" id="blue-country-name">COUNTRY</div>
        <div class="country-star-container blue-country-star-container" id="blue-country-star-container">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
            <img src="static/star-full.png">
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
