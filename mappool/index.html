<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappool</title>

    <link rel="stylesheet" href="style.css">

    <!-- Dela Gothic One Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="../_shared/deps/reconnecting-websocket.min.js"></script>
    <script src="../_shared/utils.js"></script>
    <script src="../_shared/deps/stars.js"></script>
</head>
<body>
    <video autoplay loop muted>
        <source src="static/Background.mp4">
    </video>

    <div class="main">
        <!-- Team Red -->
        <div class="country-flag red-country-flag" id="red-country-flag"></div>
        <div class="country-banner red-country-banner"></div>
        <div class="country-name red-country-name" id="red-country-name">COUNTRY</div>
        <div class="country-star-container red-country-star-container" id="red-country-star-container"></div>

        <!-- Scores -->
        <div class="current-score-container">
            <div class="current-score current-score-left" id="current-score-left">0</div>
            -
            <div class="current-score current-score-right" id="current-score-right">0</div>
        </div>

        <!-- Team Blue -->
        <div class="country-flag blue-country-flag" id="blue-country-flag"></div>
        <div class="country-banner blue-country-banner"></div>
        <div class="country-name blue-country-name" id="blue-country-name">COUNTRY</div>
        <div class="country-star-container blue-country-star-container" id="blue-country-star-container"></div>
        
        <!-- Mappool -->
        <!-- NM -->
        <div class="mappool-tag mappool-tag-left-0  nm-mappool-tag" id="nm-mappool-tag"></div>
        <div class="mappool-section-title mappool-section-title-left-23 nm-section-title" id="nm-section-title">
            <img src="static/mappool-warp-font/NM.png">
            <img class="mappool-section-title-font" src="static/mappool-font/NM.png">
        </div>
        <div class="mappool-section nm-section-top nm-section-part-1" id="nm-section-part-1"></div>
        <div class="mappool-section nm-section-top nm-section-part-2" id="nm-section-part-2"></div>
        <div class="mappool-section mappool-section-center nm-section-top" id="nm-section-5-maps"></div>

        <!-- HD -->
        <div class="mappool-tag mappool-tag-left-0  hd-mappool-tag"></div>
        <div class="mappool-section-title mappool-section-title-left-23 hd-section-title">
            <img src="static/mappool-warp-font/HD.png">
            <img class="mappool-section-title-font" src="static/mappool-font/HD.png">
        </div>
        <div class="mappool-section hd-section" id="hd-section"></div>

        <!-- HR -->
        <div class="mappool-tag hr-mappool-tag"></div>
        <div class="mappool-section-title hr-section-title">
            <img src="static/mappool-warp-font/HR.png">
            <img class="mappool-section-title-font" src="static/mappool-font/HR.png">
        </div>
        <div class="mappool-section hr-section" id="hr-section"></div>

        <!-- DT -->
        <div class="mappool-tag mappool-tag-left-463 dt-mappool-tag" id="dt-mappool-tag"></div>
        <div class="mappool-section-title mappool-section-title-left-486 dt-section-title" id="dt-section-title">
            <img src="static/mappool-warp-font/DT.png">
            <img class="mappool-section-title-font" src="static/mappool-font/DT.png">
        </div>
        <div class="mappool-section dt-section-top dt-section-part-1"></div>
        <div class="mappool-section dt-section-top dt-section-part-2"></div>
        <div class="mappool-section mappool-section-center dt-section-top" id="dt-section-3-maps"></div>

        <!-- FM -->
        <div class="mappool-tag mappool-tag-left-463 fm-mappool-tag" id="fm-mappool-tag"></div>
        <div class="mappool-section-title mappool-section-title-left-486 fm-section-title" id="fm-section-title">
            <img src="static/mappool-warp-font/FM.png">
            <img class="mappool-section-title-font" src="static/mappool-font/FM.png">
        </div>
        <div class="mappool-section fm-section-top fm-section-4-maps-part-1" id="fm-section-4-maps-part-1"></div>
        <div class="mappool-section fm-section-top fm-section-4-maps-part-2" id="fm-section-4-maps-part-2"></div>
        <div class="mappool-section mappool-section-center fm-section-top fm-section fm-section-3-maps" id="fm-section-3-maps"></div>
        <div class="mappool-section fm-section-top fm-section-2-maps-part-1" id="fm-section-2-maps-part-1"></div>
        <div class="mappool-section fm-section-top fm-section-2-maps-part-2" id="fm-section-2-maps-part-2"></div>
    </div>

    <!-- Chat -->
    <div class="chat-bubble"></div>
    <div class="chat-text">CHAT</div>
    <div class="chat-display">
        <div class="chat-container" id="chat-container"></div>
    </div>

        <div class="sidebar">
        <div class="column column-1">
            <!-- Star Control -->
            <div class="sidebar-section">
                <h1>Star Control</h1>
                <div class="sidebar-button-container">
                    <button class="sidebar-button" id="set-star-red-plus">Red ++</button>
                    <button class="sidebar-button" id="set-star-red-minus">Red --</button>
                    <button class="sidebar-button" id="set-star-blue-plus">Blue ++</button>
                    <button class="sidebar-button" id="set-star-blue-minus">Blue --</button>
                    <button class="sidebar-button full-size-button toggle-on" id="toggle-stars-button">Stars: <span id="toggle-stars-on-off">ON</span></button>
                </div>
            </div>
            <!-- Next Autopick -->
            <div class="sidebar-section">
                <h1>Next Autopick</h1>
                <div class="sidebar-text font-family-orlando-caps-cg" id="next-autopick-text">RED</div>
                <br>
                <div class="sidebar-button-container">
                    <button class="sidebar-button" id="next-autopick-red">Red</button>
                    <button class="sidebar-button" id="next-autopick-blue">Blue</button>
                    <button class="sidebar-button full-size-button toggle-off" id="toggle-autopick-button">Autopick: <span id="toggle-autopick-on-off">OFF</span></button>
                </div>
            </div>
            <!-- Current Picker -->
            <div class="sidebar-section">
                <h1>Current<br>Picker</h1>
                <div class="sidebar-text font-family-orlando-caps-cg" id="current-picker-text">RED</div>
                <br>
                <div class="sidebar-button-container">
                    <button class="sidebar-button" id="current-picker-red">Red</button>
                    <button class="sidebar-button" id="current-picker-blue">Blue</button>
                    <button class="sidebar-button full-size-button" id="current-picker-none">None</button>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
