        <link rel="preconnect" href="https://fonts.googleapis.com">

        <div id="main">

                <div class="casterCamera"><div class="casterName">SIGGE</div></div>

            <div id="pastviewFlag"></div>
            <div id="currentTeamFlag"></div>
            <div id="previewFlag"></div>
            
            <button class="teamDisplayButton" id="teamDisplaybuttonleft" onclick="teamDisplayleft();">&lt;&lt;</button>
            <button class="teamDisplayButton" id="teamDisplaybuttonright" onclick="teamDisplayright();">&gt;&gt;</button>

            <div id="lastyeartext">Last Year -</div>
            <div id="lastyearplacement"><span>Placement:</span> 25-32nd </div>
            <div id="lastyearseeding"><span>Seeding:</span> 8 </div>
            <div id="compareBox"></div>

            <img class="placements" src="static/placements.png">
            <div id="tierList">

                <div class="tierListRowBottom" id="dnqPlaceRow"></div>
            </div>

        <div id="controlPanel">
            <section id="controlPanelSectionOne">
                <div id="controlPanelAddRemovePlacesTitle">Add/Remove Places</div><br>
                <div class="controlPanelAddRemoveSectionButtons">
